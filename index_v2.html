<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANATEMA - Theological Disputation V2</title>
    <style>
        /* --- GRUNDSTIL & RETRO-KÄNSLA --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #05050a; color: #ffffff; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* --- DET DYNAMISKA STRIDSFÄLTET --- */
        .battle-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            max-height: 700px;
            border: 4px solid #3a3a4a;
            background-color: #101018;
            /* Förberett för dina framtida bakgrundsbilder: */
            background-size: cover;
            background-position: center;
            display: grid;
            grid-template-rows: 60px 30px 1fr 180px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* --- LAGER 1: INITIATIV-TIDSLINJE --- */
        .timeline-zone { display: flex; justify-content: flex-end; padding: 10px; background: rgba(0,0,0,0.4); }
        .timeline-box { display: flex; gap: 6px; background: rgba(20,20,30,0.8); border: 2px solid #555; padding: 4px; border-radius: 4px; }
        .timeline-node { width: 32px; height: 32px; background: #222; border: 1px solid #aaa; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; }
        .timeline-node.active { border-color: #ffff55; background: #444011; color: #ffff55; }
        .timeline-node.lair { border-color: #ff5555; background: #441111; color: #ff5555; }

        /* --- LAGER 2: TRANSPARENT STATUSBAR (INFLYTANDE) --- */
        .influence-zone { padding: 0 20px; }
        .influence-bar-container {
            width: 100%;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            background-color: rgba(0,0,255,0.4); /* Blå = Ortodoxi */
            display: flex;
            overflow: hidden;
            border-radius: 3px;
        }
        .influence-red-bar {
            background-color: rgba(255,0,0,0.6); /* Röd = Kätteri */
            height: 100%;
            transition: width 0.4s ease;
        }

        /* --- LAGER 3: ARENAN (AVATARER & LOGG) --- */
        .arena-zone {
            display: grid;
            grid-template-columns: 1fr 380px; /* Delar upp skärmen i spelyta och logg */
            padding: 20px;
            gap: 20px;
            min-height: 0;
        }
        
        /* Tom yta preppad för boss- och teolog-avatarer */
        .avatar-battlefield { position: relative; width: 100%; height: 100%; }
        .boss-placeholder { position: absolute; left: 10%; top: 20%; width: 150px; height: 150px; border: 2px dashed rgba(255,85,85,0.3); display: flex; justify-content: center; align-items: center; color: rgba(255,85,85,0.4); }
        .squad-placeholders { position: absolute; right: 10%; top: 15%; display: flex; flex-direction: column; gap: 15px; }
        .char-sprite-slot { width: 60px; height: 60px; border: 2px dashed rgba(85,255,85,0.3); display: flex; justify-content: center; align-items: center; color: rgba(85,255,85,0.4); }

        /* Semitransparent debattlogg i bakgrunden */
        .battle-log-box {
            background: rgba(15, 5, 5, 0.65);
            border: 2px solid #551111;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.5;
            color: #ffaaaa;
        }
        .battle-log-box strong { color: #ffffff; }
        .text-quote { color: #55ffff; font-style: italic; }

        /* --- LAGER 4: CHAINED ECHOES MENYVAL & STATUS --- */
        .hud-zone {
            display: grid;
            grid-template-columns: 1fr 400px; /* Vänster: Meny, Höger: Teolog-status */
            background: #0d0d1a;
            border-top: 4px solid #3a3a4a;
            padding: 10px;
            gap: 15px;
        }

        /* Navigeringen (Vänster) */
        .menu-container { display: flex; gap: 15px; border: 2px solid #ffff55; background: #000020; padding: 10px; border-radius: 4px; width: 100%; }
        .main-commands { width: 130px; display: flex; flex-direction: column; gap: 4px; border-right: 1px solid #444; padding-right: 10px; }
        .sub-skills-list { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; content-align: start; overflow-y: auto; }
        
        .menu-btn { background: transparent; color: #aaa; border: none; text-align: left; font-size: 12px; cursor: pointer; text-transform: uppercase; padding: 4px; font-weight: bold; }
        .menu-btn:hover, .menu-btn.active { color: #ffff55; background: rgba(255,255,85,0.1); }
        .skill-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #555; padding: 6px; font-size: 11px; border-radius: 2px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; }
        .skill-btn:hover { border-color: #ffff55; background: rgba(255,255,85,0.1); }
        .skill-cost { color: #55ffff; font-weight: bold; }

        /* Teologernas statusrader (Höger) */
        .party-status-box { display: flex; flex-direction: column; gap: 4px; justify-content: center; }
        .party-row { display: grid; grid-template-columns: 45px 110px 1fr 75px; align-items: center; background: rgba(0,0,0,0.3); border: 1px solid #444; padding: 2px 6px; border-radius: 2px; font-size: 11px; }
        .party-shield-slot { font-weight: bold; color: #55ffff; font-size: 11px; }
        .party-name { font-weight: bold; color: #ffff55; }
        
        /* HP & DE Bars */
        .bar-container { background: #300; border: 1px solid #777; height: 10px; border-radius: 2px; position: relative; margin-right: 8px; }
        .bar-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.3s; }
        .bar-fill.de { background: #0df; }
        .bar-text { font-size: 9px; position: absolute; right: 2px; top: -1px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <div class="battle-screen" id="battlefield-container">
        
        <div class="timeline-zone">
            <div class="timeline-box" id="timeline-display">
                <div class="timeline-node active">Act</div>
                <div class="timeline-node">Teo</div>
                <div class="timeline-node lair">Lair</div>
                <div class="timeline-node">Teo</div>
                <div class="timeline-node">Next</div>
            </div>
        </div>

        <div class="influence-zone">
            <div class="influence-bar-container">
                <div class="influence-red-bar" id="influence-bar-fill" style="width: 40%;"></div>
            </div>
        </div>

        <div class="arena-zone">
            <div class="influence-zone">
                <div class="avatar-battlefield">
                    <div class="boss-placeholder" id="boss-graphic">Boss Avatar</div>
                    <div class="squad-placeholders">
                        <div class="char-sprite-slot">Teo 1</div>
                        <div class="char-sprite-slot">Teo 2</div>
                        <div class="char-sprite-slot">Teo 3</div>
                        <div class="char-sprite-slot">Teo 4</div>
                    </div>
                </div>
            </div>
            
            <div class="battle-log-box" id="disputation-log">
                <div>📜 <strong>Systemet startar...</strong></div>
                <div>Välkommen apologet! Välj dina handlingar i menyn nedan.</div>
            </div>
        </div>

        <div class="hud-zone">
            
            <div class="menu-container">
                <div class="main-commands">
                    <div style="font-size:10px; color:#888; margin-bottom:4px; text-transform:uppercase;" id="active-char-title">Aktiv: Luther</div>
                    <button class="menu-btn active">Attack</button>
                    <button class="menu-btn">Skills</button>
                    <button class="menu-btn">Items</button>
                    <button class="menu-btn">Defend</button>
                </div>
                
                <div class="sub-skills-list" id="sub-commands-display">
                    <button class="skill-btn"><span>📜 Logos-argument</span></button>
                    <button class="skill-btn"><span>👥 Pathos-vädjan</span></button>
                </div>
            </div>

            <div class="party-status-box" id="party-hud-display">
                <div class="party-row">
                    <div class="party-shield-slot">🛡️ 12</div>
                    <div class="party-name">Luther</div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: 100%;"></div>
                        <span class="bar-text">HP 65/65</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill de" style="width: 100%;"></div>
                        <span class="bar-text">DE 2/2</span>
                    </div>
                </div>
                </div>

        </div>

    </div>

    <script src="motor.js"></script>
</body>
</html>
